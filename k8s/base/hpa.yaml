apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: java-shop-hpa
  namespace: java-shop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: java-shop-app
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70